<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6edf3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9d1d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="#0d1117"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#e6edf3" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Shield + AI brain icon composite -->
  <g transform="translate(60, 24)">
    <!-- Outer shield shape -->
    <path d="M70,10 L130,30 L130,80 C130,120 100,145 70,155 C40,145 10,120 10,80 L10,30 Z"
          fill="none" stroke="url(#shieldGrad)" stroke-width="3.5" stroke-linejoin="round" opacity="0.95"/>

    <!-- Inner shield glow line -->
    <path d="M70,20 L120,36 L120,78 C120,112 96,133 70,142 C44,133 20,112 20,78 L20,36 Z"
          fill="none" stroke="url(#shieldGrad)" stroke-width="1" stroke-linejoin="round" opacity="0.25"/>

    <!-- Brain/neural network icon inside shield -->
    <g transform="translate(70, 75)" filter="url(#glow)">
      <!-- Central node -->
      <circle cx="0" cy="0" r="5" fill="url(#brainGrad)" opacity="0.9"/>

      <!-- Surrounding nodes -->
      <circle cx="-20" cy="-18" r="3.5" fill="#e94560" opacity="0.8"/>
      <circle cx="20" cy="-18" r="3.5" fill="#8b5cf6" opacity="0.8"/>
      <circle cx="-25" cy="8" r="3" fill="#e94560" opacity="0.7"/>
      <circle cx="25" cy="8" r="3" fill="#533483" opacity="0.7"/>
      <circle cx="-12" cy="22" r="3" fill="#8b5cf6" opacity="0.7"/>
      <circle cx="12" cy="22" r="3" fill="#e94560" opacity="0.7"/>
      <circle cx="0" cy="-25" r="3" fill="#533483" opacity="0.8"/>

      <!-- Connection lines -->
      <g stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.5">
        <line x1="0" y1="0" x2="-20" y2="-18"/>
        <line x1="0" y1="0" x2="20" y2="-18"/>
        <line x1="0" y1="0" x2="-25" y2="8"/>
        <line x1="0" y1="0" x2="25" y2="8"/>
        <line x1="0" y1="0" x2="-12" y2="22"/>
        <line x1="0" y1="0" x2="12" y2="22"/>
        <line x1="0" y1="0" x2="0" y2="-25"/>
        <!-- Cross connections -->
        <line x1="-20" y1="-18" x2="0" y2="-25"/>
        <line x1="0" y1="-25" x2="20" y2="-18"/>
        <line x1="-20" y1="-18" x2="-25" y2="8"/>
        <line x1="20" y1="-18" x2="25" y2="8"/>
        <line x1="-25" y1="8" x2="-12" y2="22"/>
        <line x1="25" y1="8" x2="12" y2="22"/>
      </g>
    </g>

    <!-- Small lock keyhole at shield bottom -->
    <g transform="translate(70, 130)" opacity="0.6">
      <circle cx="0" cy="0" r="4" fill="none" stroke="#e94560" stroke-width="1.5"/>
      <line x1="0" y1="2" x2="0" y2="7" stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Title text -->
  <text x="230" y="95" fill="url(#titleGrad)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="700" letter-spacing="-2">ai-seclists</text>

  <!-- Tagline -->
  <text x="233" y="130" fill="#7d8590" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" letter-spacing="1.5">Security payloads for testing AI systems</text>

  <!-- Accent line under tagline -->
  <rect x="233" y="142" width="120" height="2" rx="1" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Stats badges row -->
  <g transform="translate(233, 160)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11">
    <!-- Payloads badge -->
    <rect x="0" y="0" width="85" height="22" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="10" y="15" fill="#7d8590">payloads</text>
    <text x="58" y="15" fill="#e94560" font-weight="600">6.5K+</text>

    <!-- Categories badge -->
    <rect x="95" y="0" width="90" height="22" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="105" y="15" fill="#7d8590">categories</text>
    <text x="165" y="15" fill="#8b5cf6" font-weight="600">15</text>

    <!-- License badge -->
    <rect x="195" y="0" width="72" height="22" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="205" y="15" fill="#7d8590">license</text>
    <text x="247" y="15" fill="#3fb950" font-weight="600">MIT</text>
  </g>

  <!-- Border accent -->
  <rect x="0" y="196" width="800" height="4" rx="0" fill="url(#accentGrad)" opacity="0.4"/>
</svg>
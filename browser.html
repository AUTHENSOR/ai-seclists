<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SecLists Browser</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1e;--bg2:#222228;--bg3:#2a2a32;--bg4:#32323c;
  --fg:#e0e0e0;--fg2:#a0a0a8;--fg3:#70707a;
  --gold:#C9A227;--gold2:#e0b830;--gold-dim:rgba(201,162,39,0.15);
  --border:#3a3a44;--mono:'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --radius:6px;
}
html{font-size:14px}
body{background:var(--bg);color:var(--fg);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--gold2);text-decoration:underline}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:1.5rem;font-weight:700;color:var(--fg);letter-spacing:-0.5px}
.header-left h1 span{color:var(--gold)}
.header-left p{font-size:0.85rem;color:var(--fg2);margin-top:2px}
.search-wrap{position:relative;width:100%;max-width:420px}
.search-wrap input{width:100%;padding:10px 14px 10px 36px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg);font-size:0.95rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--gold)}
.search-wrap input::placeholder{color:var(--fg3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--fg3);font-size:1rem;pointer-events:none}
.search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--bg4);color:var(--fg3);font-size:0.7rem;padding:2px 6px;border-radius:3px;border:1px solid var(--border);font-family:var(--mono)}

/* Stats bar */
.stats-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;gap:24px;font-size:0.8rem;color:var(--fg2);flex-wrap:wrap}
.stats-bar .stat{display:flex;align-items:center;gap:4px}
.stats-bar .stat strong{color:var(--gold);font-weight:600}

/* Layout */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* Sidebar */
.sidebar-header{padding:12px 16px;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--fg3);border-bottom:1px solid var(--border);font-weight:600}
.cat-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.03);transition:background .15s}
.cat-item:hover{background:var(--bg3)}
.cat-item.active{background:var(--gold-dim);border-left:3px solid var(--gold)}
.cat-item .cat-name{font-size:0.85rem;color:var(--fg);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-item.active .cat-name{color:var(--gold)}
.cat-item .badge{background:var(--bg4);color:var(--fg2);font-size:0.7rem;padding:2px 8px;border-radius:10px;min-width:32px;text-align:center;font-weight:500}
.cat-item.active .badge{background:var(--gold);color:#000;font-weight:700}
.file-list{padding-left:16px}
.file-item{padding:7px 16px 7px 20px;cursor:pointer;font-size:0.8rem;color:var(--fg2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.02);transition:background .15s}
.file-item:hover{background:var(--bg3);color:var(--fg)}
.file-item.active{color:var(--gold);background:var(--gold-dim)}
.file-item .file-badge{font-size:0.65rem;background:var(--bg4);padding:1px 6px;border-radius:8px;color:var(--fg3)}
.file-item.active .file-badge{background:var(--gold);color:#000}

/* Content area */
.content-header{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg2)}
.content-header h2{font-size:1.1rem;font-weight:600;color:var(--fg)}
.content-header p{font-size:0.8rem;color:var(--fg2);margin-top:4px}
.payload-list{flex:1;overflow-y:auto;padding:0}
.payload-row{padding:10px 24px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background .12s;display:flex;align-items:flex-start;gap:12px}
.payload-row:hover{background:var(--bg3)}
.payload-row.copied{background:var(--gold-dim)}
.payload-idx{color:var(--fg3);font-size:0.7rem;font-family:var(--mono);min-width:32px;padding-top:2px;text-align:right;user-select:none}
.payload-text{font-family:var(--mono);font-size:0.82rem;line-height:1.5;color:var(--fg);word-break:break-all;white-space:pre-wrap;flex:1}
.payload-row .copy-hint{color:var(--fg3);font-size:0.65rem;opacity:0;transition:opacity .15s;white-space:nowrap;padding-top:2px}
.payload-row:hover .copy-hint{opacity:1}
.payload-label{font-family:var(--mono);font-size:0.82rem;line-height:1.5;color:var(--gold);padding:10px 24px 2px;font-weight:500}

/* Empty / welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px;text-align:center;color:var(--fg2)}
.welcome h2{font-size:1.3rem;color:var(--fg);margin-bottom:8px}
.welcome p{font-size:0.9rem;max-width:440px;line-height:1.6}
.no-results{padding:40px;text-align:center;color:var(--fg3);font-size:0.9rem}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:#000;padding:8px 20px;border-radius:var(--radius);font-size:0.85rem;font-weight:600;opacity:0;transition:all .3s ease;pointer-events:none;z-index:100}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Footer */
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:10px 24px;text-align:center;font-size:0.75rem;color:var(--fg3)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--fg3)}

/* Mobile */
@media(max-width:768px){
  .main{flex-direction:column}
  .sidebar{width:100%;max-height:40vh;border-right:none;border-bottom:1px solid var(--border)}
  .header{padding:12px 16px}
  .search-wrap{max-width:100%}
  .stats-bar{padding:8px 16px;gap:16px}
  .payload-row{padding:8px 16px}
  .content-header{padding:12px 16px}
}
</style>

<body>

<div class="header">
  <div class="header-left">
    <h1><span>AI</span> SecLists</h1>
    <p>Security payloads for AI/LLM testing</p>
  </div>
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="Search payloads..." autocomplete="off" spellcheck="false">

  </div>
</div>

<div class="stats-bar" id="stats">

  <div class="stat">Categories: <strong id="stat-cats">0</strong></div>
  <div class="stat">Files: <strong id="stat-files">0</strong></div>
  <div class="stat">Showing: <strong id="stat-showing">0</strong></div>
  <div class="stat" style="margin-left:auto"><button onclick="randomPayload()" style="background:var(--gold);color:#000;border:none;padding:4px 12px;border-radius:4px;font-size:0.8rem;font-weight:600;cursor:pointer">Random Payload</button></div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Categories</div>
    <div id="cat-list"></div>
  </div>
  <div class="content" id="content">
    <!-- content rendered by JS -->
  </div>
</div>

<div class="toast" id="toast">Copied to clipboard</div>

<div class="footer">

// ============================================================================
// APPLICATION STATE
// ============================================================================
let activeCategory = null;
let activeFile = null;
let searchTerm = '';
let debounceTimer = null;

// Computed category tree
const categoryTree = {};
let totalPayloads = 0;
let totalFiles = 0;
let totalCategories = 0;

// Build category tree
for (const [catKey, files] of Object.entries(DATA)) {
  let catPayloads = 0;
  let catFiles = 0;
  const fileEntries = [];
  for (const [fileName, fileData] of Object.entries(files)) {
    catPayloads += fileData.payloads.length;
    catFiles++;
    totalFiles++;
    fileEntries.push({ name: fileName, count: fileData.payloads.length });
  }
  totalPayloads += catPayloads;
  totalCategories++;
  categoryTree[catKey] = { count: catPayloads, files: fileEntries, fileCount: catFiles };
}

// ============================================================================
// RENDERING
// ============================================================================
const catListEl = document.getElementById('cat-list');
const contentEl = document.getElementById('content');
const searchEl = document.getElementById('search');
const toastEl = document.getElementById('toast');

function updateStats(showing) {
  document.getElementById('stat-payloads').textContent = totalPayloads;
  document.getElementById('stat-cats').textContent = totalCategories;
  document.getElementById('stat-files').textContent = totalFiles;
  document.getElementById('stat-showing').textContent = showing;
}

function renderSidebar() {
  let html = '';
  // "All" item
  html += `<div class="cat-item${!activeCategory ? ' active' : ''}" data-cat="">
    <span class="cat-name">All Payloads</span>
    <span class="badge">${totalPayloads}</span>
  </div>`;
  for (const [catKey, catData] of Object.entries(categoryTree)) {
    const isActive = activeCategory === catKey;
    html += `<div class="cat-item${isActive ? ' active' : ''}" data-cat="${catKey}">
      <span class="cat-name">${formatCatName(catKey)}</span>
      <span class="badge">${catData.count}</span>
    </div>`;
    if (isActive) {
      html += '<div class="file-list">';
      for (const f of catData.files) {
        const isFileActive = activeFile === f.name;
        html += `<div class="file-item${isFileActive ? ' active' : ''}" data-cat="${catKey}" data-file="${f.name}">
          <span>${f.name}</span>
          <span class="file-badge">${f.count}</span>
        </div>`;
      }
      html += '</div>';
    }
  }
  catListEl.innerHTML = html;

  // Attach events
  catListEl.querySelectorAll('.cat-item').forEach(el => {
    el.addEventListener('click', () => {
      const cat = el.dataset.cat;
      if (cat === '') {
        activeCategory = null;
        activeFile = null;
      } else {
        if (activeCategory === cat) {
          // collapse
          activeCategory = null;
          activeFile = null;
        } else {
          activeCategory = cat;
          activeFile = null;
        }
      }
      renderSidebar();
      renderContent();
    });
  });
  catListEl.querySelectorAll('.file-item').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      activeCategory = el.dataset.cat;
      activeFile = el.dataset.file;
      renderSidebar();
      renderContent();
    });
  });
}

function formatCatName(key) {
  return key.replace(/\//g, ' / ').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getFilteredPayloads() {
  const results = [];
  const term = searchTerm.toLowerCase();
  for (const [catKey, files] of Object.entries(DATA)) {
    if (activeCategory && catKey !== activeCategory) continue;
    for (const [fileName, fileData] of Object.entries(files)) {
      if (activeFile && fileName !== activeFile) continue;
      for (const payload of fileData.payloads) {
        if (term && !payload.toLowerCase().includes(term) && !catKey.toLowerCase().includes(term) && !fileName.toLowerCase().includes(term)) continue;
        results.push({ category: catKey, file: fileName, text: payload });
      }
    }
  }
  return results;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightMatch(text, term) {
  if (!term) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const termEscaped = escapeHtml(term);
  const regex = new RegExp('(' + termEscaped.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(regex, '<mark style="background:var(--gold-dim);color:var(--gold);border-radius:2px;padding:0 1px">$1</mark>');
}

function renderContent() {
  const payloads = getFilteredPayloads();
  updateStats(payloads.length);

  // No welcome screen. Always show payloads.

  if (payloads.length === 0) {
    contentEl.innerHTML = `<div class="content-header">
      <h2>${getContentTitle()}</h2>
      <p>${getContentSubtitle()}</p>
    </div>
    <div class="no-results">No payloads match your search.</div>`;
    return;
  }

  let html = `<div class="content-header">
    <h2>${getContentTitle()}</h2>
    <p>${getContentSubtitle()} &middot; ${payloads.length} payload${payloads.length !== 1 ? 's' : ''}</p>
  </div>
  <div class="payload-list" id="payload-list">`;

  let lastCat = '';
  let lastFile = '';
  let idx = 0;
  for (const p of payloads) {
    // Group labels when showing all or searching
    if (!activeFile && (p.category !== lastCat || p.file !== lastFile)) {
      if (!activeCategory || p.file !== lastFile) {
        html += `<div class="payload-label"># ${formatCatName(p.category)} / ${p.file}</div>`;
      }
      lastCat = p.category;
      lastFile = p.file;
    }
    idx++;
    html += `<div class="payload-row" data-idx="${idx}" title="Click to copy">
      <span class="payload-idx">${idx}</span>
      <span class="payload-text">${highlightMatch(p.text, searchTerm)}</span>
      <span class="copy-hint">click to copy</span>
    </div>`;
  }
  html += '</div>';
  contentEl.innerHTML = html;

  // Attach copy handlers
  contentEl.querySelectorAll('.payload-row').forEach(row => {
    row.addEventListener('click', () => {
      const textEl = row.querySelector('.payload-text');
      const rawText = textEl.textContent || textEl.innerText;
      copyToClipboard(rawText);
      row.classList.add('copied');
      setTimeout(() => row.classList.remove('copied'), 600);
    });
  });
}

function getContentTitle() {
  if (searchTerm) return `Search: "${searchTerm}"`;
  if (activeFile) return activeFile;
  if (activeCategory) return formatCatName(activeCategory);
  return 'All Payloads';
}

function getContentSubtitle() {
  if (searchTerm) {
    const scope = activeCategory ? formatCatName(activeCategory) : 'all categories';
    return `Searching in ${scope}`;
  }
  if (activeFile) return formatCatName(activeCategory);
  if (activeCategory) return `${categoryTree[activeCategory].fileCount} files`;
  return `${totalCategories} categories`;
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  showToast('Copied to clipboard');
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 1500);
}

// ============================================================================
// SEARCH
// ============================================================================
searchEl.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchTerm = searchEl.value.trim();
    renderContent();
  }, 200);
});

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault();
    searchEl.focus();
    searchEl.select();
  }
  if (e.key === 'Escape' && document.activeElement === searchEl) {
    searchEl.blur();
  }
});

// ============================================================================
// INIT
// ============================================================================
function randomPayload() {
  const all = getFilteredPayloads();
  if (all.length === 0) return;
  const p = all[Math.floor(Math.random() * all.length)];
  searchEl.value = '';
  searchTerm = '';
  activeCategory = p.category;
  activeFile = null;
  renderSidebar();
  renderContent();
  // Find and highlight the random payload
  setTimeout(() => {
    const rows = document.querySelectorAll('.payload-row');
    for (const row of rows) {
      const text = row.querySelector('.payload-text');
      if (text && text.textContent.trim() === p.text.trim()) {
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        row.classList.add('copied');
        setTimeout(() => row.classList.remove('copied'), 1500);
        break;
      }
    }
  }, 100);
}

renderSidebar();
renderContent();
updateStats(totalPayloads);
</script>
